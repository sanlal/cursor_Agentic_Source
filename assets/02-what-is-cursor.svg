<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Kalam, Caveat, cursive">
  <defs>
    <filter id="w2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="2.2"/>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="#0F1A2E"/>

  <!-- Editor window frame -->
  <g filter="url(#w2)" stroke="#3DD9D6" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="120" y="120" width="760" height="460" rx="18"/>
    <!-- title bar -->
    <line x1="120" y1="170" x2="880" y2="170"/>
    <circle cx="160" cy="145" r="10" stroke="#FF5C5C" fill="#FF5C5C"/>
    <circle cx="195" cy="145" r="10" stroke="#FFD93D" fill="#FFD93D"/>
    <circle cx="230" cy="145" r="10" stroke="#5FE388" fill="#5FE388"/>
  </g>

  <!-- Code lines (file tree on left) -->
  <g filter="url(#w2)" stroke="#9AA7BD" stroke-width="3" stroke-linecap="round">
    <line x1="160" y1="210" x2="310" y2="210"/>
    <line x1="180" y1="240" x2="290" y2="240"/>
    <line x1="180" y1="270" x2="270" y2="270"/>
    <line x1="180" y1="300" x2="300" y2="300"/>
    <line x1="160" y1="330" x2="310" y2="330"/>
    <line x1="160" y1="360" x2="280" y2="360"/>
  </g>
  <!-- separator -->
  <line x1="345" y1="190" x2="345" y2="560" stroke="#3DD9D6" stroke-width="2" opacity="0.5"/>

  <!-- AI brain in the middle -->
  <g filter="url(#w2)" transform="translate(620 360)">
    <!-- brain shape -->
    <path d="M -120 -20 Q -140 -80 -80 -90 Q -60 -120 -20 -110 Q 0 -130 40 -115 Q 90 -130 110 -80 Q 140 -50 120 -10 Q 140 30 100 55 Q 90 95 30 90 Q 0 110 -40 95 Q -90 100 -110 60 Q -140 30 -120 -20 Z"
          stroke="#B388FF" stroke-width="5" fill="none"/>
    <!-- circuit traces inside -->
    <g stroke="#3DD9D6" stroke-width="3" fill="none">
      <circle cx="-40" cy="-30" r="6"/>
      <circle cx="20" cy="-50" r="6"/>
      <circle cx="60" cy="20" r="6"/>
      <circle cx="-20" cy="40" r="6"/>
      <circle cx="-70" cy="10" r="6"/>
      <line x1="-40" y1="-30" x2="20" y2="-50"/>
      <line x1="20" y1="-50" x2="60" y2="20"/>
      <line x1="60" y1="20" x2="-20" y2="40"/>
      <line x1="-20" y1="40" x2="-70" y2="10"/>
      <line x1="-70" y1="10" x2="-40" y2="-30"/>
    </g>
    <!-- pulse dots -->
    <circle cx="-40" cy="-30" r="3" fill="#FFD93D" stroke="#FFD93D"/>
    <circle cx="60" cy="20" r="3" fill="#FFD93D" stroke="#FFD93D"/>
  </g>

  <!-- "AI" label tag -->
  <g transform="translate(540 200)" filter="url(#w2)">
    <rect x="-30" y="-20" width="80" height="36" rx="8" stroke="#FFD93D" stroke-width="3" fill="none"/>
    <text x="10" y="6" font-size="26" fill="#FFD93D" text-anchor="middle" font-weight="700">AI</text>
  </g>
  <line x1="580" y1="220" x2="610" y2="280" stroke="#FFD93D" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Caption -->
  <text x="500" y="640" font-size="34" fill="#3DD9D6" text-anchor="middle">VS Code  +  AI brain  =  Cursor</text>
</svg>
