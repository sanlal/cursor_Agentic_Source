<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Kalam, Caveat, cursive">
  <defs>
    <filter id="w5" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="17"/>
      <feDisplacementMap in="SourceGraphic" scale="2.2"/>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="#0F1A2E"/>

  <!-- Step 1: research (magnifier) -->
  <g filter="url(#w5)" stroke="#B388FF" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(80 250)">
      <circle cx="70" cy="70" r="60"/>
      <line x1="115" y1="115" x2="160" y2="160"/>
      <line x1="50" y1="70" x2="90" y2="70"/>
      <line x1="70" y1="50" x2="70" y2="90"/>
    </g>
  </g>
  <text x="170" y="500" font-size="26" fill="#B388FF" text-anchor="middle">1. RESEARCH</text>
  <text x="170" y="530" font-size="18" fill="#9AA7BD" text-anchor="middle">(read-only)</text>

  <!-- Arrow 1 -->
  <path d="M 260 350 Q 350 320 420 350" stroke="#FFD93D" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="0" filter="url(#w5)"/>
  <polygon points="420,350 405,340 405,360" fill="#FFD93D" stroke="#FFD93D"/>

  <!-- Step 2: clipboard plan -->
  <g filter="url(#w5)" stroke="#FFD93D" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(420 220)">
      <rect x="20" y="30" width="140" height="180" rx="10"/>
      <rect x="65" y="10" width="50" height="36" rx="6" fill="#0F1A2E"/>
      <!-- checklist items -->
      <g stroke-width="4">
        <rect x="40" y="70" width="14" height="14"/>
        <line x1="65" y1="78" x2="140" y2="78"/>
        <rect x="40" y="100" width="14" height="14"/>
        <line x1="65" y1="108" x2="140" y2="108"/>
        <rect x="40" y="130" width="14" height="14"/>
        <line x1="65" y1="138" x2="125" y2="138"/>
        <rect x="40" y="160" width="14" height="14"/>
        <line x1="65" y1="168" x2="135" y2="168"/>
      </g>
    </g>
  </g>
  <text x="500" y="500" font-size="26" fill="#FFD93D" text-anchor="middle">2. PLAN</text>
  <text x="500" y="530" font-size="18" fill="#9AA7BD" text-anchor="middle">(confirm with you)</text>

  <!-- Arrow 2 -->
  <path d="M 660 350 Q 750 320 820 350" stroke="#5FE388" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#w5)"/>
  <polygon points="820,350 805,340 805,360" fill="#5FE388" stroke="#5FE388"/>

  <!-- Step 3: rocket / execute -->
  <g filter="url(#w5)" stroke="#5FE388" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(810 240)">
      <path d="M 40 0 Q 80 30 80 80 Q 80 130 60 160 L 20 160 Q 0 130 0 80 Q 0 30 40 0 Z"/>
      <circle cx="40" cy="70" r="14"/>
      <path d="M 0 110 L -25 130 L 20 130"/>
      <path d="M 80 110 L 105 130 L 60 130"/>
      <!-- flames -->
      <path d="M 25 165 L 20 195 L 30 180 L 40 200 L 50 180 L 60 195 L 55 165" stroke="#FF8C42"/>
    </g>
  </g>
  <text x="860" y="500" font-size="26" fill="#5FE388" text-anchor="middle">3. EXECUTE</text>
  <text x="860" y="530" font-size="18" fill="#9AA7BD" text-anchor="middle">(switch to Agent)</text>

  <!-- Lock icon (read-only badge) -->
  <g filter="url(#w5)" stroke="#FF5C5C" stroke-width="4" fill="none" stroke-linecap="round" transform="translate(95 130)">
    <rect x="0" y="20" width="50" height="40" rx="6"/>
    <path d="M 10 20 V 12 Q 25 -5 40 12 V 20"/>
    <circle cx="25" cy="40" r="4" fill="#FF5C5C" stroke="#FF5C5C"/>
  </g>
  <text x="170" y="130" font-size="20" fill="#FF5C5C">no edits yet</text>

  <!-- Title -->
  <text x="500" y="80" font-size="34" fill="#3DD9D6" text-anchor="middle">Plan Mode: think before you ship</text>
</svg>
