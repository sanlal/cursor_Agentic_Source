<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Kalam, Caveat, cursive">
  <defs>
    <filter id="w5a" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="41"/>
      <feDisplacementMap in="SourceGraphic" scale="2.2"/>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="#0F1A2E"/>

  <!-- Title -->
  <text x="500" y="55" font-size="32" fill="#F4F1E8" text-anchor="middle" font-weight="700">AGENT MODE  =  think -&gt; act -&gt; observe (loop)</text>

  <!-- Center robot in glow ring -->
  <circle cx="500" cy="370" r="110" fill="none" stroke="#5FE388" stroke-width="2" opacity="0.5"/>
  <circle cx="500" cy="370" r="135" fill="none" stroke="#5FE388" stroke-width="1" opacity="0.25"/>

  <g filter="url(#w5a)" stroke="#5FE388" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(500 370)">
    <line x1="0" y1="-90" x2="0" y2="-70"/>
    <circle cx="0" cy="-95" r="6" fill="#FFD93D" stroke="#FFD93D"/>
    <rect x="-55" y="-70" width="110" height="80" rx="14"/>
    <circle cx="-22" cy="-38" r="8" fill="#FFD93D" stroke="#FFD93D"/>
    <circle cx="22" cy="-38" r="8" fill="#FFD93D" stroke="#FFD93D"/>
    <path d="M -16 -12 Q 0 -2 16 -12"/>
    <rect x="-65" y="20" width="130" height="60" rx="12"/>
  </g>
  <rect x="450" y="510" width="100" height="36" rx="10" stroke="#5FE388" stroke-width="3" fill="none" filter="url(#w5a)"/>
  <text x="500" y="535" font-size="22" fill="#5FE388" text-anchor="middle">AGENT</text>

  <!-- 4 tools surrounding -->
  <g filter="url(#w5a)" stroke="#FFD93D" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(140 140)">
      <rect x="0" y="0" width="120" height="100" rx="10"/>
      <line x1="20" y1="30" x2="100" y2="30"/>
      <line x1="20" y1="50" x2="100" y2="50"/>
      <line x1="20" y1="70" x2="80" y2="70"/>
    </g>
  </g>
  <text x="200" y="270" font-size="22" fill="#FFD93D" text-anchor="middle">READ</text>
  <text x="200" y="295" font-size="14" fill="#9AA7BD" text-anchor="middle">file contents, by line</text>
  <path d="M 270 200 Q 360 260 430 320" stroke="#FFD93D" stroke-width="3" fill="none" stroke-dasharray="6 6"/>

  <g filter="url(#w5a)" stroke="#FF8C42" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(740 140)">
      <path d="M0 80 L60 20 L100 60 L40 120 L0 120 Z"/>
      <line x1="60" y1="20" x2="100" y2="60"/>
      <line x1="50" y1="50" x2="70" y2="70"/>
    </g>
  </g>
  <text x="810" y="280" font-size="22" fill="#FF8C42" text-anchor="middle">EDIT</text>
  <text x="810" y="305" font-size="14" fill="#9AA7BD" text-anchor="middle">diffs you approve</text>
  <path d="M 730 230 Q 660 280 580 320" stroke="#FF8C42" stroke-width="3" fill="none" stroke-dasharray="6 6"/>

  <g filter="url(#w5a)" stroke="#B388FF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(160 500)">
      <circle cx="35" cy="35" r="32"/>
      <line x1="58" y1="58" x2="90" y2="90"/>
    </g>
  </g>
  <text x="220" y="630" font-size="22" fill="#B388FF" text-anchor="middle">SEARCH</text>
  <text x="220" y="655" font-size="14" fill="#9AA7BD" text-anchor="middle">grep + glob</text>
  <path d="M 260 500 Q 340 460 430 410" stroke="#B388FF" stroke-width="3" fill="none" stroke-dasharray="6 6"/>

  <g filter="url(#w5a)" stroke="#3DD9D6" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(740 510)">
      <rect x="0" y="0" width="120" height="90" rx="8"/>
      <polyline points="15,28 35,48 15,68"/>
      <line x1="45" y1="68" x2="100" y2="68"/>
    </g>
  </g>
  <text x="800" y="630" font-size="22" fill="#3DD9D6" text-anchor="middle">SHELL</text>
  <text x="800" y="655" font-size="14" fill="#9AA7BD" text-anchor="middle">npm test, git, etc.</text>
  <path d="M 740 530 Q 650 470 570 410" stroke="#3DD9D6" stroke-width="3" fill="none" stroke-dasharray="6 6"/>
</svg>
