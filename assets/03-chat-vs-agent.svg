<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Kalam, Caveat, cursive">
  <defs>
    <filter id="w3" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="2.2"/>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="#0F1A2E"/>

  <!-- Title -->
  <text x="500" y="55" font-size="34" fill="#F4F1E8" text-anchor="middle" font-weight="700">4 WAYS TO TALK TO CURSOR</text>
  <text x="500" y="86" font-size="18" fill="#9AA7BD" text-anchor="middle">small task --&gt; big task</text>

  <!-- Ladder of 4 rungs, left to right, increasing trust -->
  <!-- Arrow under all 4 -->
  <line x1="80" y1="600" x2="900" y2="600" stroke="#3DD9D6" stroke-width="3" filter="url(#w3)"/>
  <polygon points="900,600 880,590 880,610" fill="#3DD9D6" stroke="#3DD9D6"/>
  <text x="100" y="635" font-size="18" fill="#9AA7BD">tiny edits</text>
  <text x="820" y="635" font-size="18" fill="#9AA7BD">full features</text>

  <!-- Rung 1: TAB -->
  <g filter="url(#w3)" transform="translate(80 150)">
    <rect x="0" y="0" width="180" height="380" rx="18" stroke="#FFD93D" stroke-width="4" fill="none"/>
    <!-- Tab key icon -->
    <g transform="translate(50 50)" stroke="#FFD93D" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="0" width="80" height="50" rx="8"/>
      <text x="40" y="34" font-size="22" fill="#FFD93D" text-anchor="middle" font-weight="700">Tab</text>
    </g>
    <text x="90" y="160" font-size="22" fill="#FFD93D" text-anchor="middle" font-weight="700">AUTOCOMPLETE</text>
    <text x="90" y="200" font-size="16" fill="#F4F1E8" text-anchor="middle">multi-line, multi-file</text>
    <text x="90" y="225" font-size="16" fill="#F4F1E8" text-anchor="middle">prediction</text>
    <!-- Ghost text preview -->
    <g stroke="#9AA7BD" stroke-width="2" fill="none" stroke-dasharray="3 3" opacity="0.7">
      <line x1="20" y1="260" x2="120" y2="260"/>
      <line x1="20" y1="280" x2="160" y2="280"/>
      <line x1="20" y1="300" x2="100" y2="300"/>
    </g>
    <text x="90" y="345" font-size="15" fill="#9AA7BD" text-anchor="middle">"finish my thought"</text>
  </g>

  <!-- Rung 2: Cmd+K -->
  <g filter="url(#w3)" transform="translate(290 150)">
    <rect x="0" y="0" width="180" height="380" rx="18" stroke="#FF8C42" stroke-width="4" fill="none"/>
    <g transform="translate(20 50)" stroke="#FF8C42" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="0" y="0" width="60" height="50" rx="8"/>
      <text x="30" y="34" font-size="20" fill="#FF8C42" text-anchor="middle" font-weight="700">Ctrl</text>
      <text x="68" y="34" font-size="22" fill="#FF8C42">+</text>
      <rect x="80" y="0" width="50" height="50" rx="8"/>
      <text x="105" y="34" font-size="22" fill="#FF8C42" text-anchor="middle" font-weight="700">K</text>
    </g>
    <text x="90" y="160" font-size="22" fill="#FF8C42" text-anchor="middle" font-weight="700">INLINE EDIT</text>
    <text x="90" y="200" font-size="16" fill="#F4F1E8" text-anchor="middle">select code,</text>
    <text x="90" y="225" font-size="16" fill="#F4F1E8" text-anchor="middle">describe change</text>
    <!-- Mini diff icon -->
    <g transform="translate(40 250)" stroke-width="3" fill="none">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#FF5C5C"/>
      <line x1="0" y1="20" x2="60" y2="20" stroke="#5FE388"/>
      <line x1="0" y1="40" x2="50" y2="40" stroke="#5FE388"/>
    </g>
    <text x="90" y="345" font-size="15" fill="#9AA7BD" text-anchor="middle">"rewrite this block"</text>
  </g>

  <!-- Rung 3: Chat -->
  <g filter="url(#w3)" transform="translate(500 150)">
    <rect x="0" y="0" width="180" height="380" rx="18" stroke="#3DD9D6" stroke-width="4" fill="none"/>
    <g transform="translate(20 50)" stroke="#3DD9D6" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="0" y="0" width="60" height="50" rx="8"/>
      <text x="30" y="34" font-size="20" fill="#3DD9D6" text-anchor="middle" font-weight="700">Ctrl</text>
      <text x="68" y="34" font-size="22" fill="#3DD9D6">+</text>
      <rect x="80" y="0" width="50" height="50" rx="8"/>
      <text x="105" y="34" font-size="22" fill="#3DD9D6" text-anchor="middle" font-weight="700">L</text>
    </g>
    <text x="90" y="160" font-size="22" fill="#3DD9D6" text-anchor="middle" font-weight="700">CHAT</text>
    <text x="90" y="200" font-size="16" fill="#F4F1E8" text-anchor="middle">sidebar Q&amp;A</text>
    <text x="90" y="225" font-size="16" fill="#F4F1E8" text-anchor="middle">applies edits if asked</text>
    <!-- Chat bubble -->
    <g transform="translate(20 250)" stroke="#3DD9D6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 0 h140 v36 h-100 l-20 18 v-18 h-20 z"/>
      <line x1="14" y1="14" x2="120" y2="14"/>
      <line x1="14" y1="26" x2="100" y2="26"/>
    </g>
    <text x="90" y="345" font-size="15" fill="#9AA7BD" text-anchor="middle">"why is this slow?"</text>
  </g>

  <!-- Rung 4: Agent -->
  <g filter="url(#w3)" transform="translate(710 150)">
    <rect x="0" y="0" width="200" height="380" rx="18" stroke="#5FE388" stroke-width="5" fill="none"/>
    <rect x="8" y="8" width="184" height="364" rx="12" stroke="#5FE388" stroke-width="2" fill="none" opacity="0.35"/>
    <g transform="translate(30 50)" stroke="#5FE388" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="0" y="0" width="60" height="50" rx="8"/>
      <text x="30" y="34" font-size="20" fill="#5FE388" text-anchor="middle" font-weight="700">Ctrl</text>
      <text x="68" y="34" font-size="22" fill="#5FE388">+</text>
      <rect x="80" y="0" width="50" height="50" rx="8"/>
      <text x="105" y="34" font-size="22" fill="#5FE388" text-anchor="middle" font-weight="700">I</text>
    </g>
    <text x="100" y="160" font-size="22" fill="#5FE388" text-anchor="middle" font-weight="700">AGENT</text>
    <text x="100" y="200" font-size="16" fill="#F4F1E8" text-anchor="middle">autonomous,</text>
    <text x="100" y="225" font-size="16" fill="#F4F1E8" text-anchor="middle">multi-file, tools</text>
    <!-- Mini robot -->
    <g transform="translate(60 250)" stroke="#5FE388" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="40" y1="-10" x2="40" y2="0"/>
      <circle cx="40" cy="-14" r="4" fill="#FFD93D" stroke="#FFD93D"/>
      <rect x="10" y="0" width="60" height="38" rx="8"/>
      <circle cx="25" cy="16" r="4" fill="#FFD93D" stroke="#FFD93D"/>
      <circle cx="55" cy="16" r="4" fill="#FFD93D" stroke="#FFD93D"/>
      <path d="M 28 28 Q 40 33 52 28"/>
      <rect x="5" y="42" width="70" height="28" rx="6"/>
    </g>
    <text x="100" y="345" font-size="15" fill="#9AA7BD" text-anchor="middle">"build the feature"</text>
  </g>
</svg>
