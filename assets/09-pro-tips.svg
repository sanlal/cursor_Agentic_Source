<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Kalam, Caveat, cursive">
  <defs>
    <filter id="w9" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="31"/>
      <feDisplacementMap in="SourceGraphic" scale="2.2"/>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="#0F1A2E"/>

  <!-- Title -->
  <text x="500" y="60" font-size="40" fill="#F4F1E8" text-anchor="middle" font-weight="700">PRO TIPS</text>
  <text x="500" y="92" font-size="20" fill="#9AA7BD" text-anchor="middle">supercharge the agent</text>

  <!-- Central lightbulb -->
  <g filter="url(#w9)" transform="translate(500 380)" stroke="#FFD93D" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -50 -50 Q -50 -100 0 -100 Q 50 -100 50 -50 Q 50 -20 30 0 L 30 30 L -30 30 L -30 0 Q -50 -20 -50 -50 Z"/>
    <line x1="-25" y1="40" x2="25" y2="40"/>
    <line x1="-22" y1="50" x2="22" y2="50"/>
    <line x1="-15" y1="60" x2="15" y2="60"/>
    <!-- filament -->
    <path d="M -15 -45 Q 0 -25 15 -45"/>
    <!-- rays -->
    <line x1="0" y1="-120" x2="0" y2="-135"/>
    <line x1="-70" y1="-80" x2="-90" y2="-90"/>
    <line x1="70" y1="-80" x2="90" y2="-90"/>
    <line x1="-90" y1="-30" x2="-110" y2="-30"/>
    <line x1="90" y1="-30" x2="110" y2="-30"/>
  </g>

  <!-- 5 tip cards around lightbulb -->
  <!-- 1. RULES (top-left) -->
  <g filter="url(#w9)" transform="translate(150 150)">
    <rect x="0" y="0" width="220" height="100" rx="14" stroke="#3DD9D6" stroke-width="4" fill="none"/>
    <text x="20" y="40" font-size="22" fill="#3DD9D6" font-weight="700">1. RULES</text>
    <text x="20" y="68" font-size="16" fill="#F4F1E8">.cursor/rules/*.md</text>
    <text x="20" y="88" font-size="16" fill="#9AA7BD">persistent project context</text>
  </g>

  <!-- 2. SKILLS (top-right) -->
  <g filter="url(#w9)" transform="translate(630 150)">
    <rect x="0" y="0" width="220" height="100" rx="14" stroke="#FF8C42" stroke-width="4" fill="none"/>
    <text x="20" y="40" font-size="22" fill="#FF8C42" font-weight="700">2. SKILLS</text>
    <text x="20" y="68" font-size="16" fill="#F4F1E8">SKILL.md per workflow</text>
    <text x="20" y="88" font-size="16" fill="#9AA7BD">reusable playbooks</text>
  </g>

  <!-- 3. MCP (middle-left) -->
  <g filter="url(#w9)" transform="translate(80 350)">
    <rect x="0" y="0" width="220" height="100" rx="14" stroke="#5FE388" stroke-width="4" fill="none"/>
    <text x="20" y="40" font-size="22" fill="#5FE388" font-weight="700">3. MCP</text>
    <text x="20" y="68" font-size="16" fill="#F4F1E8">tools + data sources</text>
    <text x="20" y="88" font-size="16" fill="#9AA7BD">Jira, Slack, DB, ...</text>
  </g>

  <!-- 4. HOOKS (middle-right) -->
  <g filter="url(#w9)" transform="translate(700 350)">
    <rect x="0" y="0" width="220" height="100" rx="14" stroke="#B388FF" stroke-width="4" fill="none"/>
    <text x="20" y="40" font-size="22" fill="#B388FF" font-weight="700">4. HOOKS</text>
    <text x="20" y="68" font-size="16" fill="#F4F1E8">hooks.json events</text>
    <text x="20" y="88" font-size="16" fill="#9AA7BD">auto-format, auto-test</text>
  </g>

  <!-- 5. SLASH (bottom center) -->
  <g filter="url(#w9)" transform="translate(390 560)">
    <rect x="0" y="0" width="220" height="100" rx="14" stroke="#FFD93D" stroke-width="4" fill="none"/>
    <text x="20" y="40" font-size="22" fill="#FFD93D" font-weight="700">5. SLASH /</text>
    <text x="20" y="68" font-size="16" fill="#F4F1E8">/loop /split-to-prs</text>
    <text x="20" y="88" font-size="16" fill="#9AA7BD">shortcuts to recipes</text>
  </g>

  <!-- Connecting rays from bulb to each card -->
  <g stroke="#FFD93D" stroke-width="2" fill="none" stroke-dasharray="4 6" opacity="0.5">
    <line x1="430" y1="320" x2="280" y2="240"/>
    <line x1="570" y1="320" x2="720" y2="240"/>
    <line x1="420" y1="380" x2="300" y2="400"/>
    <line x1="580" y1="380" x2="700" y2="400"/>
    <line x1="500" y1="440" x2="500" y2="560"/>
  </g>
</svg>
