<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Kalam, Caveat, cursive">
  <defs>
    <filter id="w8" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="29"/>
      <feDisplacementMap in="SourceGraphic" scale="2.2"/>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="#0F1A2E"/>

  <!-- Title -->
  <text x="500" y="60" font-size="40" fill="#F4F1E8" text-anchor="middle" font-weight="700">MODEL SELECTION GUIDE</text>

  <!-- Three columns: FAST/CHEAP | DAILY DRIVER | MAX QUALITY -->
  <!-- Column 1 -->
  <g filter="url(#w8)">
    <rect x="60" y="120" width="260" height="440" rx="20" fill="none" stroke="#9AA7BD" stroke-width="4"/>
  </g>
  <!-- lightning + $ icon -->
  <g filter="url(#w8)" transform="translate(190 210)">
    <polygon points="-25,-30 5,-30 -10,0 15,0 -15,40 -5,8 -25,8" fill="none" stroke="#FFD93D" stroke-width="4" stroke-linejoin="round"/>
    <text x="35" y="20" font-size="44" fill="#5FE388" font-weight="700">$</text>
  </g>
  <text x="190" y="310" font-size="28" fill="#9AA7BD" text-anchor="middle" font-weight="700">FAST &amp; CHEAP</text>
  <line x1="90" y1="335" x2="290" y2="335" stroke="#9AA7BD" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="190" y="365" font-size="18" fill="#9AA7BD" text-anchor="middle">Haiku, GPT-4o-mini</text>
  <line x1="90" y1="390" x2="290" y2="390" stroke="#9AA7BD" stroke-width="1" stroke-dasharray="4 4"/>
  <g font-size="18" fill="#F4F1E8">
    <text x="80" y="425">- Small edits</text>
    <text x="80" y="455">- Boilerplate</text>
    <text x="80" y="485">- Parallel subagents</text>
    <text x="80" y="515">- Grunt work</text>
  </g>

  <!-- Column 2 (highlighted - default) -->
  <g filter="url(#w8)">
    <rect x="370" y="100" width="260" height="460" rx="20" fill="none" stroke="#3DD9D6" stroke-width="6"/>
    <rect x="378" y="108" width="244" height="444" rx="14" fill="none" stroke="#3DD9D6" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- car/steering wheel icon -->
  <g filter="url(#w8)" transform="translate(500 200)" stroke="#3DD9D6" stroke-width="4" fill="none" stroke-linecap="round">
    <circle cx="0" cy="0" r="30"/>
    <circle cx="0" cy="0" r="8"/>
    <line x1="-30" y1="0" x2="-8" y2="0"/>
    <line x1="30" y1="0" x2="8" y2="0"/>
    <line x1="0" y1="8" x2="0" y2="30"/>
  </g>
  <text x="500" y="290" font-size="28" fill="#3DD9D6" text-anchor="middle" font-weight="700">DAILY DRIVER</text>
  <line x1="400" y1="315" x2="600" y2="315" stroke="#3DD9D6" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="500" y="345" font-size="18" fill="#3DD9D6" text-anchor="middle">Claude Sonnet, GPT-4o</text>
  <line x1="400" y1="370" x2="600" y2="370" stroke="#3DD9D6" stroke-width="1" stroke-dasharray="4 4"/>
  <g font-size="18" fill="#F4F1E8">
    <text x="390" y="405">- Most Plan Mode work</text>
    <text x="390" y="435">- Feature development</text>
    <text x="390" y="465">- Standard coding</text>
  </g>
  <!-- default badge -->
  <g transform="translate(545 510)" filter="url(#w8)">
    <polygon points="0,0 14,0 7,14" stroke="#FFD93D" fill="#FFD93D"/>
    <text x="22" y="12" font-size="16" fill="#FFD93D" font-weight="700">DEFAULT</text>
    <text x="22" y="30" font-size="16" fill="#FFD93D" font-weight="700">CHOICE</text>
  </g>

  <!-- Column 3 -->
  <g filter="url(#w8)">
    <rect x="680" y="120" width="260" height="440" rx="20" fill="none" stroke="#FF8C42" stroke-width="4"/>
  </g>
  <!-- crown icon -->
  <g filter="url(#w8)" transform="translate(810 210)" stroke="#FF8C42" stroke-width="4" fill="none" stroke-linejoin="round">
    <path d="M -35 10 L -35 -30 L -15 -10 L 0 -35 L 15 -10 L 35 -30 L 35 10 Z"/>
    <line x1="-35" y1="20" x2="35" y2="20"/>
    <circle cx="0" cy="-3" r="4" fill="#FFD93D" stroke="#FFD93D"/>
  </g>
  <text x="810" y="310" font-size="28" fill="#FF8C42" text-anchor="middle" font-weight="700">MAX QUALITY</text>
  <line x1="710" y1="335" x2="910" y2="335" stroke="#FF8C42" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="810" y="365" font-size="18" fill="#FF8C42" text-anchor="middle">Claude Opus, o1</text>
  <line x1="710" y1="390" x2="910" y2="390" stroke="#FF8C42" stroke-width="1" stroke-dasharray="4 4"/>
  <g font-size="18" fill="#F4F1E8">
    <text x="700" y="425">- Complex refactors</text>
    <text x="700" y="455">- Auth / Security</text>
    <text x="700" y="485">- Critical billing</text>
    <text x="700" y="515">- Final verification</text>
  </g>
  <!-- "when it matters" tag -->
  <text x="855" y="155" font-size="16" fill="#FF8C42">when it</text>
  <text x="855" y="175" font-size="16" fill="#FF8C42">MATTERS</text>
  <path d="M 845 160 Q 820 175 805 195" stroke="#FF8C42" stroke-width="2" fill="none"/>

  <!-- Bottom tip -->
  <g filter="url(#w8)" transform="translate(500 630)">
    <rect x="-240" y="-22" width="480" height="44" rx="22" fill="none" stroke="#FFD93D" stroke-width="3"/>
    <text x="0" y="8" font-size="22" fill="#FFD93D" text-anchor="middle">Match the model to the task complexity</text>
  </g>
</svg>
