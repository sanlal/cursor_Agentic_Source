<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Kalam, Caveat, cursive">
  <defs>
    <filter id="w6" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="19"/>
      <feDisplacementMap in="SourceGraphic" scale="2.2"/>
    </filter>
    <symbol id="bot" viewBox="-60 -100 120 200">
      <line x1="0" y1="-90" x2="0" y2="-75" stroke-linecap="round"/>
      <circle cx="0" cy="-95" r="5" fill="#FFD93D" stroke="#FFD93D"/>
      <rect x="-40" y="-75" width="80" height="60" rx="10"/>
      <circle cx="-16" cy="-50" r="6" fill="#FFD93D" stroke="#FFD93D"/>
      <circle cx="16" cy="-50" r="6" fill="#FFD93D" stroke="#FFD93D"/>
      <path d="M -12 -30 Q 0 -22 12 -30"/>
      <rect x="-45" y="-15" width="90" height="50" rx="8"/>
    </symbol>
  </defs>

  <rect width="1000" height="700" fill="#0F1A2E"/>

  <!-- Main (parent) agent at top -->
  <g filter="url(#w6)" stroke="#3DD9D6" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <use href="#bot" x="430" y="100" width="140" height="190"/>
  </g>
  <text x="500" y="280" font-size="26" fill="#3DD9D6" text-anchor="middle">PARENT AGENT</text>

  <!-- Branching lines -->
  <g stroke="#3DD9D6" stroke-width="3" fill="none" stroke-dasharray="6 6" filter="url(#w6)">
    <path d="M 500 290 Q 250 380 180 480"/>
    <path d="M 500 290 Q 400 380 380 480"/>
    <path d="M 500 290 Q 600 380 620 480"/>
    <path d="M 500 290 Q 750 380 820 480"/>
  </g>

  <!-- Subagents (4 different colors / tasks) -->
  <g filter="url(#w6)" stroke="#FFD93D" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <use href="#bot" x="120" y="470" width="120" height="160"/>
  </g>
  <text x="180" y="660" font-size="20" fill="#FFD93D" text-anchor="middle">explore</text>

  <g filter="url(#w6)" stroke="#FF8C42" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <use href="#bot" x="320" y="470" width="120" height="160"/>
  </g>
  <text x="380" y="660" font-size="20" fill="#FF8C42" text-anchor="middle">shell</text>

  <g filter="url(#w6)" stroke="#5FE388" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <use href="#bot" x="560" y="470" width="120" height="160"/>
  </g>
  <text x="620" y="660" font-size="20" fill="#5FE388" text-anchor="middle">browser</text>

  <g filter="url(#w6)" stroke="#B388FF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <use href="#bot" x="760" y="470" width="120" height="160"/>
  </g>
  <text x="820" y="660" font-size="20" fill="#B388FF" text-anchor="middle">CI-investigator</text>

  <!-- Cloud above parent -->
  <g filter="url(#w6)" stroke="#9AA7BD" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 80 130 Q 60 100 90 90 Q 100 60 140 70 Q 170 50 200 80 Q 240 70 240 110 Q 260 130 230 145 Q 200 160 160 150 Q 110 160 90 145 Q 60 145 80 130 Z"/>
  </g>
  <text x="160" y="125" font-size="18" fill="#9AA7BD" text-anchor="middle">background</text>
  <text x="160" y="148" font-size="18" fill="#9AA7BD" text-anchor="middle">(cloud)</text>
  <path d="M 240 130 Q 320 140 430 180" stroke="#9AA7BD" stroke-width="2" fill="none" stroke-dasharray="4 4"/>

  <!-- Title -->
  <text x="500" y="60" font-size="32" fill="#3DD9D6" text-anchor="middle">Subagents = parallel hands</text>
</svg>
