<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Kalam, Caveat, cursive">
  <defs>
    <filter id="w4" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="13"/>
      <feDisplacementMap in="SourceGraphic" scale="2.2"/>
    </filter>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="#0F1A2E"/>

  <!-- Title -->
  <text x="500" y="55" font-size="36" fill="#F4F1E8" text-anchor="middle" font-weight="700">THE @ SYMBOL</text>
  <text x="500" y="86" font-size="20" fill="#9AA7BD" text-anchor="middle">how you feed Cursor context</text>

  <!-- Central giant @ -->
  <g filter="url(#w4)">
    <circle cx="500" cy="380" r="80" fill="none" stroke="#3DD9D6" stroke-width="5"/>
    <circle cx="500" cy="380" r="95" fill="none" stroke="#3DD9D6" stroke-width="2" opacity="0.4"/>
  </g>
  <text x="500" y="412" font-size="92" fill="#3DD9D6" text-anchor="middle" font-weight="700" filter="url(#glow4)">@</text>

  <!-- 7 ref types arranged in a circle around the @ -->
  <!-- @file (top) -->
  <g filter="url(#w4)" transform="translate(440 140)">
    <rect x="0" y="0" width="120" height="58" rx="10" stroke="#FFD93D" stroke-width="3" fill="none"/>
    <text x="60" y="26" font-size="20" fill="#FFD93D" text-anchor="middle" font-weight="700">@file</text>
    <text x="60" y="48" font-size="13" fill="#9AA7BD" text-anchor="middle">single file</text>
  </g>
  <line x1="500" y1="200" x2="500" y2="295" stroke="#FFD93D" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- @folder (upper-right) -->
  <g filter="url(#w4)" transform="translate(720 175)">
    <rect x="0" y="0" width="140" height="58" rx="10" stroke="#FF8C42" stroke-width="3" fill="none"/>
    <text x="70" y="26" font-size="20" fill="#FF8C42" text-anchor="middle" font-weight="700">@folder</text>
    <text x="70" y="48" font-size="13" fill="#9AA7BD" text-anchor="middle">whole directory</text>
  </g>
  <line x1="720" y1="220" x2="570" y2="335" stroke="#FF8C42" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- @code (right) -->
  <g filter="url(#w4)" transform="translate(770 360)">
    <rect x="0" y="0" width="130" height="58" rx="10" stroke="#5FE388" stroke-width="3" fill="none"/>
    <text x="65" y="26" font-size="20" fill="#5FE388" text-anchor="middle" font-weight="700">@code</text>
    <text x="65" y="48" font-size="13" fill="#9AA7BD" text-anchor="middle">a function/symbol</text>
  </g>
  <line x1="770" y1="390" x2="585" y2="385" stroke="#5FE388" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- @docs (lower-right) -->
  <g filter="url(#w4)" transform="translate(720 530)">
    <rect x="0" y="0" width="140" height="58" rx="10" stroke="#B388FF" stroke-width="3" fill="none"/>
    <text x="70" y="26" font-size="20" fill="#B388FF" text-anchor="middle" font-weight="700">@docs</text>
    <text x="70" y="48" font-size="13" fill="#9AA7BD" text-anchor="middle">library docs (React, etc.)</text>
  </g>
  <line x1="720" y1="555" x2="570" y2="430" stroke="#B388FF" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- @web (bottom) -->
  <g filter="url(#w4)" transform="translate(440 600)">
    <rect x="0" y="0" width="120" height="58" rx="10" stroke="#FFD93D" stroke-width="3" fill="none"/>
    <text x="60" y="26" font-size="20" fill="#FFD93D" text-anchor="middle" font-weight="700">@web</text>
    <text x="60" y="48" font-size="13" fill="#9AA7BD" text-anchor="middle">live search</text>
  </g>
  <line x1="500" y1="600" x2="500" y2="465" stroke="#FFD93D" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- @git (lower-left) -->
  <g filter="url(#w4)" transform="translate(140 530)">
    <rect x="0" y="0" width="120" height="58" rx="10" stroke="#FF5C5C" stroke-width="3" fill="none"/>
    <text x="60" y="26" font-size="20" fill="#FF5C5C" text-anchor="middle" font-weight="700">@git</text>
    <text x="60" y="48" font-size="13" fill="#9AA7BD" text-anchor="middle">diffs &amp; commits</text>
  </g>
  <line x1="260" y1="555" x2="430" y2="430" stroke="#FF5C5C" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- @codebase (left) -->
  <g filter="url(#w4)" transform="translate(80 360)">
    <rect x="0" y="0" width="150" height="58" rx="10" stroke="#3DD9D6" stroke-width="3" fill="none"/>
    <text x="75" y="26" font-size="20" fill="#3DD9D6" text-anchor="middle" font-weight="700">@codebase</text>
    <text x="75" y="48" font-size="13" fill="#9AA7BD" text-anchor="middle">whole repo (RAG)</text>
  </g>
  <line x1="230" y1="390" x2="415" y2="385" stroke="#3DD9D6" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- @past (upper-left) -->
  <g filter="url(#w4)" transform="translate(140 175)">
    <rect x="0" y="0" width="140" height="58" rx="10" stroke="#FF8C42" stroke-width="3" fill="none"/>
    <text x="70" y="26" font-size="20" fill="#FF8C42" text-anchor="middle" font-weight="700">@past chat</text>
    <text x="70" y="48" font-size="13" fill="#9AA7BD" text-anchor="middle">earlier sessions</text>
  </g>
  <line x1="280" y1="220" x2="430" y2="335" stroke="#FF8C42" stroke-width="2" stroke-dasharray="4 4"/>
</svg>
